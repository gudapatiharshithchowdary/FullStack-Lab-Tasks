<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Employer Dashboard - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <nav>
        <h2><a href="/" style="margin-left:0; color:var(--primary-color);">JobPortal</a></h2>
        <div>
            <a th:href="@{/employer/job/new}" class="btn" style="margin-right:1rem;">Post New Job</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-secondary">Logout</button>
            </form>
        </div>
    </nav>
    <div class="glass-container">
        <h2>Your Posted Jobs</h2>
        <input type="text" id="searchInput" class="dynamic-search-box" placeholder="Search jobs by title or skills..."
            onkeyup="filterTable()">
        <table id="jobsTable">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Salary</th>
                    <th>Skills Required</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="job : ${jobs}">
                    <td th:text="${job.title}">Software Engineer</td>
                    <td th:text="${job.salary}">$100,000</td>
                    <td th:text="${job.skillsRequired}">Java, Spring Boot</td>
                    <td>
                        <a th:href="@{/employer/job/applicants/{id}(id=${job.id})}" class="btn"
                            style="padding: 0.3rem 0.8rem; font-size: 0.9em;">View Applicants</a>
                        <a th:href="@{/employer/job/edit/{id}(id=${job.id})}" class="btn btn-secondary"
                            style="padding: 0.3rem 0.8rem; font-size: 0.9em;">Edit</a>
                        <a th:href="@{/employer/job/delete/{id}(id=${job.id})}"
                            style="color: tomato; margin-left: 0.5rem; text-decoration: none;"
                            onclick="return confirm('Are you sure you want to delete this job?');">Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(jobs)}">
                    <td colspan="4" style="text-align:center;">You have not posted any jobs yet.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function filterTable() {
            var input, filter, table, tr, td, i, j, txtValue;
            input = document.getElementById("searchInput");
            filter = input.value.toLowerCase();
            table = document.getElementById("jobsTable");
            tr = table.getElementsByTagName("tr");

            for (i = 1; i < tr.length; i++) {
                tr[i].style.display = "none";
                td = tr[i].getElementsByTagName("td");
                for (j = 0; j < td.length; j++) {
                    if (td[j]) {
                        txtValue = td[j].textContent || td[j].innerText;
                        if (txtValue.toLowerCase().indexOf(filter) > -1) {
                            tr[i].style.display = "";
                            break;
                        }
                    }
                }
            }
        }
    </script>
</body>

</html>
